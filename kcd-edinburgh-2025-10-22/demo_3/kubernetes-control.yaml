version: 1.1.0
variant: flatcar
storage:
  links:
    - target: /opt/extensions/kubernetes/kubernetes-v1.33.0-x86-64.raw
      path: /etc/extensions/kubernetes.raw
      hard: false
  files:
    - path: /opt/extensions/kubernetes/kubernetes-v1.33.0-x86-64.raw
      contents:
        source: http://10.0.2.2:8000/kubernetes-v1.33.0-x86-64.raw
    - path: /etc/sysupdate.kubernetes.d/kubernetes-v1.33.conf
      contents:
        source: http://10.0.2.2:8000/kubernetes-v1.33.conf
    - path: /etc/sysupdate.d/noop.conf
      contents:
        source: http://10.0.2.2:8000/noop.conf
    - path: /etc/systemd/network/00-vmbus.network
      contents:
        inline: |
          [Match]
          Name=eth1
          [Network]
          Address=192.168.254.1/24
    - path: /etc/hostname
      contents:
        inline: |
          controlplane

    - path: /etc/ssl/certs/zot.pem
      contents:
        local: zot/cert/zot.crt
    - path: /etc/containerd/config.toml
      contents:
        local: containerd/config.toml

systemd:
  units:
    - name: systemd-sysupdate.timer
      enabled: true
      dropins:
        - name: bootcheck.conf
          contents: |
            [Timer]
            OnBootSec=1min
            OnUnitActiveSec=10s
            RandomizedDelaySec=1s
    - name: systemd-sysupdate.service
      dropins:
        - name: kubernetes.conf
          contents: |
            [Service]
            ExecStartPre=/usr/bin/sh -c "readlink --canonicalize /etc/extensions/kubernetes.raw > /tmp/kubernetes"
            ExecStartPre=/usr/lib/systemd/systemd-sysupdate -C kubernetes update
            ExecStartPost=/usr/bin/sh -c "readlink --canonicalize /etc/extensions/kubernetes.raw > /tmp/kubernetes-new"
            ExecStartPost=/usr/bin/sh -c "if ! cmp --silent /tmp/kubernetes /tmp/kubernetes-new; then touch /run/reboot-required; fi"

    - name: kubeadm.service
      enabled: true
      contents: |
        [Unit]
        Description=Kubeadm service
        Requires=containerd.service
        After=containerd.service
        ConditionPathExists=!/etc/kubernetes/kubelet.conf
        [Service]
        Type=oneshot
        ExecStart=/usr/bin/kubeadm init --control-plane-endpoint=192.168.254.1 --apiserver-cert-extra-sans localhost --apiserver-advertise-address=192.168.254.1 --pod-network-cidr 10.128.0.0/16 --service-cidr 10.129.0.0/16 --kubernetes-version 1.33.0
        ExecStartPost=install -o core -g core -m0700 -d /home/core/.kube
        ExecStartPost=install -o core -g core /etc/kubernetes/admin.conf /home/core/.kube/config
        [Install]
        WantedBy=multi-user.target
      dropins:
        - name: more-time.conf
          contents: |
            [Service]
            TimeoutStartSec=infinity
    - name: kubelet.service
      dropins:
        - name: 00-node-ip.conf
          contents: |
            [Service]
            Environment="KUBELET_EXTRA_ARGS=--node-ip 192.168.254.1"
    - name: update-engine.service
      mask: true
    - name: locksmithd.service
      mask: true

    - name: mnt.mount
      enabled: true
      contents_local: mnt.mount
    - name: containerd.service
      dropins:
        - name: config.conf
          contents_local: containerd/config.conf
